version: "3.9"

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: contentops
      MYSQL_USER: contentops
      MYSQL_PASSWORD: contentops
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ucontentops", "-pcontentops"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      PYTHONPATH: /app/apps/api:/app/apps/worker:/app
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "cd /app/apps/api &&
      alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../.env
    environment:
      PYTHONPATH: /app/apps/api:/app/apps/worker:/app
    volumes:
      - ..:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "cd /app && celery -A apps.worker.app.celery_app.celery_app worker --loglevel=INFO"

  beat:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../.env
    environment:
      PYTHONPATH: /app/apps/api:/app/apps/worker:/app
    volumes:
      - ..:/app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "cd /app && celery -A apps.worker.app.celery_app.celery_app beat --loglevel=INFO"

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
    env_file:
      - ../.env
    volumes:
      - ..:/app
    ports:
      - "3000:3000"
    depends_on:
      - api
    command: >
      sh -c "cd /app/apps/admin && npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  mysql_data:
